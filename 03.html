<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p>Unordered List</p>
    <ul type="square">
      <li>Apple</li>
      <li>Banana</li>
      <li>Orange</li>
    </ul>
    <p>Ordered List</p>
    <ol type="1">
      <li>First Item</li>
      <li>Second Item</li>
      <li>Third Item</li>
    </ol>
    <p>Description List</p>
    <dl>
      <dt>HTML</dt>
      <dd>Hypertext Markup Language</dd>
      <dt>CSS</dt>
      <dd>Cascading Style Sheets</dd>
      <dt>JS</dt>
      <dd>JavaScript</dd>
    </dl>
  </body>
</html>
